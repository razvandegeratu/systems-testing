name: Run Unit Tests

# Această secțiune dictează CÂND se rulează acțiunea
on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: fedora-latest # Mașina virtuală pe care va rula
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3 # Descarcă codul tău pe mașina virtuală
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Run tests
      # Adăugăm '-s calea/catre/folder' ca să îi spunem unde să caute
      run: python -m unittest discover -s laboratories/cicd-documentation
